<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Photographic style leg strength training scene">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c7d6"/>
      <stop offset="50%" stop-color="#8399ad"/>
      <stop offset="100%" stop-color="#576a7e"/>
    </linearGradient>
    <radialGradient id="light" cx="25%" cy="18%" r="35%">
      <stop offset="0%" stop-color="#f7fbff" stop-opacity="0.58"/>
      <stop offset="100%" stop-color="#f7fbff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f1c7a5"/>
      <stop offset="100%" stop-color="#cc9a76"/>
    </linearGradient>
    <linearGradient id="top" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#526b84"/>
      <stop offset="100%" stop-color="#2a3f52"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#42566c"/>
      <stop offset="100%" stop-color="#27384a"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="1.0" numOctaves="2" seed="37" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="11" flood-color="#1b2733" flood-opacity="0.42"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#light)"/>
  <rect y="500" width="1200" height="175" fill="#354b60"/>

  <g filter="url(#shadow)">
    <ellipse cx="607" cy="178" rx="80" ry="95" fill="url(#skin)"/>
    <path d="M532 178c7-69 73-108 135-89 33 10 56 34 68 67-39-10-84 0-121 11-28 9-53 21-76 39-7-11-9-18-6-28z" fill="#2b3948"/>
    <path d="M500 282c37-31 65-45 110-45 50 0 87 19 127 48v92H500v-95z" fill="url(#top)"/>
    <path d="M560 376h103v61c0 37-10 65-29 95l-24 39h-1l-24-40c-18-30-25-55-25-94v-61z" fill="#233342"/>
    <path d="M589 435c-58 15-118 54-170 109" stroke="#8ca4b8" stroke-width="15" stroke-linecap="round" fill="none"/>
    <path d="M632 435c56 16 116 54 168 111" stroke="#8ca4b8" stroke-width="15" stroke-linecap="round" fill="none"/>
    <path d="M550 430h44l-25 186h-76z" fill="url(#pants)"/>
    <path d="M653 430h-44l24 186h77z" fill="url(#pants)"/>
    <rect x="476" y="608" width="104" height="33" rx="16" fill="#1f2d3a"/>
    <rect x="623" y="608" width="104" height="33" rx="16" fill="#1f2d3a"/>
  </g>

  <rect width="1200" height="675" filter="url(#grain)"/>
</svg>
