<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-label="Photographic style neck rehab training scene">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b8c7d5"/>
      <stop offset="55%" stop-color="#7d95aa"/>
      <stop offset="100%" stop-color="#4f6072"/>
    </linearGradient>
    <radialGradient id="sun" cx="22%" cy="20%" r="38%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.52"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2c9aa"/>
      <stop offset="100%" stop-color="#cf9c78"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5f748a"/>
      <stop offset="100%" stop-color="#304355"/>
    </linearGradient>
    <filter id="grain" x="-10%" y="-10%" width="120%" height="120%">
      <feTurbulence type="fractalNoise" baseFrequency="1.1" numOctaves="2" seed="14" result="n"/>
      <feColorMatrix in="n" type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.08"/>
      </feComponentTransfer>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1b2631" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect width="1200" height="675" fill="url(#sun)"/>
  <rect y="470" width="1200" height="205" fill="#344657"/>
  <ellipse cx="800" cy="520" rx="260" ry="85" fill="#1f2c39" opacity="0.45"/>

  <g filter="url(#shadow)">
    <ellipse cx="605" cy="230" rx="95" ry="112" fill="url(#skin)"/>
    <path d="M522 210c26-72 142-88 178 5 12 29 9 68-6 90-22-40-64-51-95-51-38 0-64 10-82 24-12-27-10-47 5-68z" fill="#2b3949"/>
    <path d="M528 355c26-35 67-58 130-58 73 0 120 27 151 72v193H457V391c18-19 39-33 71-36z" fill="url(#shirt)"/>
    <path d="M563 300c7 24 23 40 42 52 22-13 37-28 44-50v68c-14 17-28 31-45 44-18-12-31-25-41-41v-73z" fill="url(#skin)"/>
    <path d="M529 252c31 16 62 20 92 20 27 0 52-6 78-17" stroke="#e3b896" stroke-width="12" stroke-linecap="round" fill="none"/>
    <path d="M611 410c-10-30-10-68 0-104" stroke="#d7ac8b" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M611 410c29-29 58-60 84-91" stroke="#cddbe7" stroke-width="15" stroke-linecap="round" fill="none"/>
    <path d="M611 410c-30-31-56-58-81-90" stroke="#cddbe7" stroke-width="15" stroke-linecap="round" fill="none"/>
  </g>

  <rect width="1200" height="675" filter="url(#grain)"/>
</svg>
